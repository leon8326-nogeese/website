<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nogeese Linux Server Dashboard</title>
    <script>
        function getSystemInfo() {
            fetch("sysinfo.sh")
            .then(response => response.text())
            .then(data => document.getElementById("sysinfo").innerText = data);
        }

        function checkUpdates() {
            fetch("check_updates.sh")
            .then(response => response.text())
            .then(data => document.getElementById("updates").innerText = data);
        }

        function updateSystem() {
            fetch("update_system.sh")
            .then(response => response.text())
            .then(data => document.getElementById("update_status").innerText = data);
        }

        function listSSHUsers() {
            fetch("list_ssh_users.sh")
            .then(response => response.text())
            .then(data => document.getElementById("ssh_users").innerText = data);
        }

        function addSSHUser() {
            let username = prompt("Enter the username to allow SSH access:");
            if (username) {
                fetch("add_ssh_user.sh?user=" + username)
                .then(response => response.text())
                .then(data => alert(data));
                listSSHUsers(); // Refresh the user list
            }
        }

        function removeSSHUser() {
            let username = prompt("Enter the username to remove SSH access:");
            if (username) {
                fetch("remove_ssh_user.sh?user=" + username)
                .then(response => response.text())
                .then(data => alert(data));
                listSSHUsers(); // Refresh the user list
            }
        }
    </script>
</head>
<body>
    <h1>Nogeese Linux Server Dashboard</h1>

    <h2>System Info</h2>
    <button onclick="getSystemInfo()">Get System Info</button>
    <pre id="sysinfo">Click the button to fetch system info...</pre>

    <h2>Package Updates</h2>
    <button onclick="checkUpdates()">Check for Updates</button>
    <pre id="updates">Click the button to check for updates...</pre>

    <h2>Update System</h2>
    <button onclick="updateSystem()">Update System</button>
    <pre id="update_status">Click the button to update the system...</pre>

    <h2>SSH User Management</h2>
    <button onclick="listSSHUsers()">List SSH Users</button>
    <pre id="ssh_users">Click the button to see SSH-enabled users...</pre>
    
    <button onclick="addSSHUser()">Add SSH User</button>
    <button onclick="removeSSHUser()">Remove SSH User</button>
</body>
</html>
