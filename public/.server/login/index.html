<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        async function redirectToLogin() {
            try {
                const response = await fetch("../info.txt");
                const text = await response.text();
                const match = text.match(/INFOSERVERLOGINCLIENT="([^"]+)"/);
                
                if (match && match[1]) {
                    window.location.href = match[1]; // Redirect
                } else {
                    document.body.innerHTML = "<h2>Error: Unable to find login redirection URL.</h2>";
                }
            } catch (error) {
                document.body.innerHTML = "<h2>Error: Unable to fetch server information.</h2>";
            }
        }
        redirectToLogin();
    </script>
</head>
<body>
    <h2>Redirecting to login page...</h2>
</body>
</html>
